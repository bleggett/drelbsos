on:
  workflow_call:
    inputs:
      profile:
        description: 'Build profile (selects the drelbsos-<profile> OCI repo to diff)'
        type: string
        required: false
        default: 'nvidia'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (selects the drelbsos-<profile> OCI repo to diff)'
        default: 'nvidia'
      handwritten:
        description: 'Small changelog about changes in this build:'
      target:
        description: 'Release Branch (e.g., testing). Defaults to branch name.'
permissions:
  contents: write

name: Generate Release
jobs:
  generate-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout last 500 commits (for <commits> to work)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 500

      - name: Get target
        id: get-target
        run: |
          TARGET="${{ github.event.inputs.target || github.ref }}"
          TARGET="${TARGET##*/}"
          echo "target=$TARGET" >> $GITHUB_OUTPUT
      
      - name: Generate Release Text
        id: generate-release
        run: |
          python3 ./.github/workflows/changelog.py \
            "${{ steps.get-target.outputs.target }}" \
            ./output.env ./changelog.md --workdir . \
            --handwritten "${{ github.event.inputs.handwritten }}" \
            --profile "${{ inputs.profile || 'nvidia' }}" \
            --owner "${{ github.repository_owner }}" \
            --image-name "${{ github.event.repository.name }}"
          source ./output.env
          echo "title=${TITLE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v2
        with:
          name: ${{ steps.generate-release.outputs.title }}
          tag_name: ${{ steps.generate-release.outputs.tag }}
          body_path: ./changelog.md
          make_latest: ${{ steps.get-target.outputs.target == 'main' }}
          prerelease: ${{ steps.get-target.outputs.target != 'main' }}
